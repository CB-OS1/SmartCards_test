<!DOCTYPE html>
<!--
  SmartCards — Version 1.4
  Änderungshistorie:
  v1.0 – Umbenennung von "VocabolarIo" zu "SmartCards", alle Italienisch-spezifischen
         Funktionen entfernt (Konjugator, 500-Verben-Beispielsätze, Verbtyp-Erkennung,
         GitHub-Import), Spalten it/de -> frage/antwort, Lernrichtungs-Auswahl entfernt
         (immer Frage -> Antwort).
  v1.1 – Spalten notiz1/notiz2 -> seite3/seite4 umbenannt. Beide Zusatzseiten werden
         jetzt als eigene Kartenseiten gezeigt (statt zusammen auf einer Seite) --
         siehe extraSeiten().
  v1.2 – Hinweistext "Jede Kachel entspricht..." auf der Deck-Auswahl entfernt,
         Link "Vokabeln laden" -> "Decks laden", übrige "Vokabeln"-Texte auf
         "Decks"/"Karten" vereinheitlicht.
  v1.3 – Link "Decks laden" -> "SmartCards laden".
  v1.4 – Neu: Arbeitsblatt "Stundenplan" in der xlsx wird erkannt (siehe
         leseStundenplan/deckAusWorkbook), nicht als Lern-Deck behandelt,
         sondern über eine eigene kleine Kachel auf der Deck-Auswahl als
         Tabellen-Ansicht geöffnet (zeigeStundenplan). Speicherformat von
         "vocab-datei" geändert auf { decks, stundenplan } -- alte gespeicherte
         Stände (vor v1.4) werden beim nächsten Laden verworfen und die Datei
         muss einmal neu hochgeladen werden.
  v1.5 – Stundenplan-Färbung nutzt jetzt die echte Excel-Zellfarbe (zellFarbe(),
         inkl. Tint-Berechnung für Theme-Farben) statt der Text-Heuristik
         ("Pause"/"Essen" im Zellinhalt suchen). Dafür liest _parseWorkbook das
         Workbook jetzt mit {cellStyles:true}, und leseStundenplan() baut das
         Raster über !ref/decode_range statt sheet_to_json, damit die
         Style-Info pro Zelle erhalten bleibt.
  v1.6 – Neu: "SmartCards laden" öffnet jetzt einen Auswahl-Bildschirm
         (zeigeLadenAuswahl) statt direkt den Datei-Upload. Zusätzlich zum
         eigenen Datei-Upload gibt es "Vordefinierte Sets laden" -- die Liste
         kommt aus einer config.xlsx (Spalten Anzeigename/Dateiname) im
         selben GitHub-Repo wie diese HTML-Datei (ermittleGithubRawBasis()
         leitet Benutzername+Repo aus window.location ab). Gleiche Logik wie
         in Vocabolario/Ucabulario, damit dieselbe config.xlsx-Konvention für
         beide Apps funktioniert.
  v1.7 – Neu: "App komplett zurücksetzen"-Link auf der Deck-Auswahl (unterhalb
         der Deck-Kacheln, dezent per .niveau-wechsel-Stil). Fragt per
         confirm() nach, löscht dann "vocab-datei" sowie alle
         "vocab-progress-*"-Keys und lädt die Seite per location.reload() neu
         -- siehe setzeAppKomplettZurueck().
  v1.8 – Link umbenannt in "Decks zurücksetzen". window.confirm() ersetzt
         durch einen eigenen, zur App passenden Bestätigungs-Dialog
         (zeigeBestaetigungsDialog(), generisch für künftige Ja/Nein-Abfragen)
         -- der native Browser-confirm() rahmt sich selbst mit Text wie "Auf
         dieser Seite wird Folgendes angezeigt" ein, was besonders bei
         file://-Seiten unpassend aussieht und sich nicht stylen lässt.
-->

<meta name="theme-color" content="#17324f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SmartCards">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root{
    --inchiostro: #17324f;     /* dunkles Marineblau, "Tinte" */
    --carta: #f3f7fb;          /* Papierton, kühles Blauweiß */
    --mare: #2f6690;           /* Seeblau, starker Akzent (ehem. Terrakotta) */
    --cielo: #7fb2d6;          /* Himmelblau, ruhiger Kontrast (ehem. Salbeigrün) */
    --azzurro: #3f8fd1;        /* Azurblau, klarer Akzent (ehem. Senfgold) */
    --linea: rgba(23,50,79,0.14);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background: var(--carta);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(31,45,61,0.06) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--inchiostro);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
  }

  .app{
    width:100%;
    max-width:480px;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    padding: 20px 18px 28px;
  }

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 6px;
  }
  .titel{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  .titel em{ color: var(--azzurro); font-style: normal; }
  .untertitel{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color: var(--inchiostro);
    opacity:0.55;
  }

  .stats{
    display:flex;
    gap:10px;
    margin: 14px 0 18px;
    font-size:12px;
  }
  .pill{
    border:1px solid var(--linea);
    border-radius:999px;
    padding:6px 12px;
    display:flex;
    align-items:center;
    gap:6px;
    background: rgba(255,255,255,0.4);
  }
  .dot{width:7px; height:7px; border-radius:50%;}
  .dot.cielo{background:var(--cielo);}
  .dot.mare{background:var(--mare);}
  .dot.azzurro{background:var(--azzurro);}

  .stage{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    perspective: 1400px;
  }

  .deck-label{
    text-align:center;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    opacity:0.5;
    margin-bottom:10px;
  }

  .card{
    position:relative;
    width:100%;
    aspect-ratio: 4/5;
    max-height: 420px;
    cursor:pointer;
  }

  .face{
    position:absolute;
    inset:0;
    border-radius: 18px;
    border: 1.5px solid var(--inchiostro);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 32px 24px;
    text-align:center;
    box-shadow: 6px 6px 0 var(--inchiostro);
    transition: transform 0.35s cubic-bezier(.4,.2,.2,1), opacity 0.25s ease;
  }
  .face.front{ background: #f8fbfe; }
  .face.back, .face.notiz{
    background: var(--inchiostro);
    color: var(--carta);
  }
  .face.eintretend{
    transform: scale(0.96);
    opacity: 0;
  }

  .kategorie{
    position:absolute;
    top:14px;
    left:16px;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    opacity:0.5;
  }

  .notiz-badge{
    position:absolute;
    top:14px;
    right:16px;
    width:20px;
    height:20px;
    border-radius:50%;
    background: var(--azzurro);
    color: var(--inchiostro);
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .wort{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 36px;
    line-height:1.1;
    margin-bottom:10px;
  }
  .face.back .wort{ color: var(--azzurro); }

  .hinweis{
    font-size:12px;
    opacity:0.45;
    position:absolute;
    bottom:16px;
  }

  .notiz-text{
    font-size:16px;
    line-height:1.6;
    color: var(--azzurro);
    max-width: 90%;
    white-space: pre-wrap;
  }

  .controls{
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  button{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:14px;
    border-radius: 12px;
    border: 1.5px solid var(--inchiostro);
    padding: 14px 0;
    flex:1;
    cursor:pointer;
    background:#f8fbfe;
    color:var(--inchiostro);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: 3px 3px 0 var(--inchiostro);
  }
  button:active{ transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--inchiostro); }

  .btn-zurueck{ background: #eaf5fb; }
  .btn-weiter{ background: var(--azzurro); color:#f8fbfe; }
  button:disabled{ opacity:0.35; cursor:default; }
  button:disabled:active{ transform:none; box-shadow: 3px 3px 0 var(--inchiostro); }

  .reset-row{
    text-align:center;
    margin-top: 18px;
    font-size:12px;
  }
  .reset-row a{
    color: var(--inchiostro);
    opacity:0.5;
    text-decoration: underline;
    cursor:pointer;
  }

  .fertig{
    text-align:center;
    padding: 40px 10px;
  }
  .fertig .wort{ font-size:24px; }
  .fertig p{ opacity:0.6; font-size:14px; margin: 10px 0 22px; }

  @media (prefers-reduced-motion: reduce){
    .card{ transition: none; }
  }

  /* Niveau-Auswahl */
  .niveau-screen{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap: 8px;
  }
  .niveau-frage{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .niveau-unter{
    font-size:13px;
    opacity:0.55;
    margin-bottom: 28px;
    max-width: 280px;
  }
  .niveau-optionen{
    display:flex;
    flex-direction:column;
    gap: 14px;
    width: 100%;
    max-width: 320px;
  }
  .niveau-btn{
    text-align:left;
    border: 1.5px solid var(--inchiostro);
    border-radius: 14px;
    padding: 18px 20px;
    background: #f8fbfe;
    cursor:pointer;
    box-shadow: 4px 4px 0 var(--inchiostro);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .niveau-btn:active{ transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--inchiostro); }
  .niveau-btn .label{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 20px;
    display:block;
  }
  .niveau-btn .desc{
    font-size:12px;
    opacity:0.55;
    margin-top: 4px;
    display:block;
  }
  .niveau-btn.a1 .label{ color: var(--cielo); }
  .niveau-btn.a2 .label{ color: var(--mare); }
  .niveau-wechsel{
    text-align:center;
    margin-top: 12px;
    font-size:12px;
  }
  .niveau-wechsel a{
    color: var(--inchiostro);
    opacity:0.5;
    text-decoration: underline;
    cursor:pointer;
  }

  /* Laden-Übersicht: eigene Datei (oben) vs. vordefinierte Sets (unten) */
  .lade-trenner{
    width:100%;
    max-width:320px;
    border:none;
    border-top:1.5px solid var(--inchiostro);
    opacity:0.18;
    margin: 26px 0 16px;
  }
  .lade-unterschrift{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.05em;
    opacity:0.45;
    margin-bottom:12px;
    width:100%;
    max-width:320px;
    text-align:left;
  }
  .lade-liste{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
    max-width:320px;
  }
  /* Bewusst anderer Stil als .niveau-btn: kompakter, mit Icon in einer Zeile,
     damit auf den ersten Blick klar ist "hier lädt man etwas nach", statt wie
     bei der Deck-Auswahl ein Inhaltsverzeichnis zu wirken. */
  .lade-kachel{
    display:flex;
    align-items:center;
    gap:12px;
    text-align:left;
    border: 1.5px solid var(--mare);
    border-radius: 12px;
    padding: 12px 16px;
    background: #eef5fa;
    cursor:pointer;
    box-shadow: 3px 3px 0 var(--mare);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .lade-kachel:active{ transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--mare); }
  .lade-icon{ font-size:18px; flex-shrink:0; }
  .lade-label{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 15px;
    color: var(--inchiostro);
  }
  .lade-status{
    font-size:12px;
    opacity:0.5;
    text-align:center;
    width:100%;
  }
  .lade-status-fehler{ color: var(--mare); opacity:1; }

  /* Eigener Bestätigungs-Dialog statt window.confirm() -- der native Browser-
     Dialog rahmt sich selbst mit Text wie "Auf dieser Seite wird Folgendes
     angezeigt" ein (besonders bei file://-Seiten auffällig) und lässt sich
     optisch nicht an die App anpassen. */
  .modal-overlay{
    position:fixed;
    inset:0;
    background: rgba(23,50,79,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    z-index:1000;
  }
  .modal-box{
    background: var(--carta);
    border: 1.5px solid var(--inchiostro);
    border-radius: 14px;
    box-shadow: 5px 5px 0 var(--inchiostro);
    padding: 22px 22px 18px;
    max-width: 320px;
    width:100%;
  }
  .modal-text{
    font-size:14px;
    line-height:1.5;
    color: var(--inchiostro);
    margin-bottom:18px;
  }
  .modal-buttons{
    display:flex;
    gap:10px;
  }
  .modal-btn{
    flex:1;
    border:none;
    border-radius:10px;
    padding:11px 0;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    font-family: inherit;
  }
  .modal-btn-abbrechen{
    background: transparent;
    border: 1.5px solid var(--inchiostro);
    color: var(--inchiostro);
  }
  .modal-btn-bestaetigen{
    background: var(--mare);
    color: var(--carta);
  }

  /* Stundenplan: kleine Kachel auf der Deck-Auswahl, bewusst unauffälliger
     (kleiner, blasserer Hintergrund, dünnerer Schatten) als die echten
     Deck-Kacheln -- signalisiert "andere Art von Inhalt, kein Lern-Deck". */
  .stundenplan-kachel{
    align-self:center;
    display:inline-flex;
    align-items:center;
    gap:6px;
    border: 1.5px solid var(--inchiostro);
    border-radius: 10px;
    padding: 8px 16px;
    background: rgba(127,178,214,0.22);
    cursor:pointer;
    box-shadow: 2px 2px 0 var(--inchiostro);
    font-size:13px;
    font-weight:600;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .stundenplan-kachel:active{
    transform: translate(1px,1px);
    box-shadow: 1px 1px 0 var(--inchiostro);
  }

  .stundenplan-screen{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding: 4px 0;
  }
  .stundenplan-wrapper{
    overflow-x:auto;
    border: 1.5px solid var(--inchiostro);
    border-radius: 12px;
    box-shadow: 4px 4px 0 var(--inchiostro);
  }
  .stundenplan-tabelle{
    border-collapse: collapse;
    width:100%;
    font-size:12px;
    background:#f8fbfe;
  }
  .stundenplan-tabelle th, .stundenplan-tabelle td{
    border: 1px solid var(--linea);
    padding: 7px 9px;
    text-align:center;
    white-space: nowrap;
  }
  .stundenplan-tabelle thead th{
    background: var(--inchiostro);
    color: var(--carta);
    font-weight:700;
    position: sticky;
    top: 0;
  }

  /* Upload-Bereich */
  .upload-zone{
    border: 2px dashed var(--inchiostro);
    border-radius: 14px;
    padding: 28px 20px;
    text-align:center;
    cursor:pointer;
    background: rgba(255,255,255,0.3);
    transition: background 0.15s;
    position:relative;
    margin-top: 8px;
  }
  .upload-zone:hover, .upload-zone.drag{ background: rgba(255,255,255,0.65); }
  .upload-zone input[type=file]{
    position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
  }
  .upload-icon{ font-size:32px; margin-bottom:6px; }
  .upload-text{ font-size:13px; opacity:0.6; line-height:1.5; }
  .upload-text strong{ color: var(--mare); }
  .upload-fehler{
    background: #e8f1f7;
    border: 1.5px solid var(--mare);
    border-radius: 10px;
    padding: 10px 14px;
    font-size:12px;
    color: var(--mare);
    margin-top: 10px;
    display:none;
  }
  .upload-info{
    font-size:11px;
    opacity:0.45;
    margin-top:10px;
    text-align:center;
    line-height:1.5;
  }
  .niveau-btn.eigene .label{ color: var(--azzurro); }

  /* "SmartCards laden"-Link, immer zentriert unten, unabhängig vom Zustand */
  .datei-laden-row{
    text-align:center;
    margin-top: 14px;
    font-size:13px;
  }
  .datei-laden-row a{
    color: var(--inchiostro);
    opacity:0.55;
    text-decoration: underline;
    cursor:pointer;
  }
  .datei-laden-fehler{
    background: #e8f1f7;
    border: 1.5px solid var(--mare);
    border-radius: 10px;
    padding: 10px 14px;
    font-size:12px;
    color: var(--mare);
    margin: 10px auto 0;
    max-width: 320px;
    text-align:center;
    display:none;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="titel">Smart<em>Cards</em></div>
      <div class="untertitel" id="untertitelText">Karteikarten</div>
    </div>
  </header>

  <div class="stats" id="statsRow">
    <div class="pill"><span class="dot azzurro"></span><span id="statHeute">0</span> Karten heute</div>
  </div>

  <div class="stage" id="stage"></div>

  <div class="reset-row" id="resetRow"><a id="resetLink">Fortschritt zurücksetzen</a> · <a id="deckLink">Deck wechseln</a></div>
  <div class="datei-laden-row"><a id="linkVokabelnLaden">SmartCards laden</a></div>
</div>

<script>

// Einzige Quelle der Wahrheit für die Versionsnummer -- der HTML-Kommentar ganz oben
// in der Datei ist nur für Menschen, die die Historie lesen wollen; dieser const
// hier ist der, den der Code tatsächlich zur Laufzeit nutzen kann (z.B. für dieses
// console.log, oder später z.B. um in einer Fehlermeldung die Version mitzuschicken).
const APP_VERSION = '1.8';
console.log(`SmartCards v${APP_VERSION}`);

// Baut die Liste der zusätzlichen Kartenseiten (nach front/back), die diese Karte
// tatsächlich hat -- nur Felder mit Inhalt tauchen auf, in fester Reihenfolge
// seite3 vor seite4. So klickt sich niemand durch eine leere Seite, nur weil das
// jeweils andere Feld gefüllt war (z.B. nur seite4 befüllt -> genau ein Extra-Zustand,
// mit dem Titel "Seite 4", nicht "Seite 3").
function extraSeiten(v){
  const seiten = [];
  if(v.seite3) seiten.push({ titel: 'Seite 3', text: v.seite3 });
  if(v.seite4) seiten.push({ titel: 'Seite 4', text: v.seite4 });
  return seiten;
}

// Gibt es für diese Karte überhaupt eine Extra-Seite? Für den kleinen Badge oben
// rechts auf front/back, der andeutet "hier kommt noch mehr".
function hatNotiz(v){
  return extraSeiten(v).length > 0;
}

// Höchster erreichbarer zustand-Wert für eine Karte. Reihenfolge ist immer
// front(0) -> back(1) -> [je ein Zustand pro tatsächlich vorhandener Extra-Seite].
function maxZustandFuer(v){
  return 1 + extraSeiten(v).length;
}


function mische(array){
  const a = array.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}


// ---------- App-Zustand ----------
let AKTIVE_DATEI = null;  // { blattname: [ {frage,antwort,kat,seite3,seite4}, ... ], ... } — alle Decks der zuletzt geladenen xlsx
let DECK_NAME = null;     // Name des aktuell gewählten Arbeitsblatts/Decks
let SORTIERT = true;      // true = Reihenfolge wie in der xlsx | false = gemischt
let STUNDENPLAN = null;   // Rohe Zeilen des Arbeitsblatts "Stundenplan" (falls vorhanden), sonst null

// Baut VOKABELN aus dem aktuellen Deck neu auf, abhängig von SORTIERT.
// .slice() bei sortiert wichtig: liefert eine Kopie, damit VOKABELN nie auf
// dasselbe Array-Objekt wie AKTIVE_DATEI[DECK_NAME] zeigt -- sonst würde
// spätere Bearbeitung von VOKABELN (aktuell passiert das nirgends, aber sicher
// ist sicher) versehentlich auch die Originaldaten verändern.
function vokabelnNeuLaden(){
  return SORTIERT ? AKTIVE_DATEI[DECK_NAME].slice() : mische(AKTIVE_DATEI[DECK_NAME]);
}
let VOKABELN = [];
let idx = 0;
let zustand = 0; // 0 = Frage, 1 = Antwort, 2 = Notiz (nur wenn vorhanden)
let punkte = { heute:0 };

// Falls window.storage nicht existiert (z.B. beim Hosting auf GitHub Pages,
// im Gegensatz zur Claude-Artefakt-Umgebung, wo diese API bereitgestellt wird),
// bauen wir hier einen Ersatz auf Basis von localStorage. Die Schnittstelle
// (get/set/delete/list, jeweils async, gleiche Rückgabeform) ist identisch,
// dadurch merken ladeDatei(), speichereDatei() usw. weiter unten gar nicht,
// dass sie mit einem Ersatz statt dem Original sprechen.
if (typeof window.storage === 'undefined') {
  window.storage = {
    async get(key){
      const value = localStorage.getItem(key);
      return value === null ? null : { key, value };
    },
    async set(key, value){
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key){
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
    async list(prefix){
      const keys = [];
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    }
  };
}

const stage = document.getElementById('stage');

// ---------- Persistenz: Datei (alle Decks + Stundenplan) ----------

}

// decks und stundenplan kommen immer zusammen aus derselben xlsx und werden
// auch immer zusammen gebraucht (siehe init()) -- deshalb ein gemeinsamer
// Storage-Key statt zwei getrennter, das spart einen Roundtrip beim Laden.
async function speichereDatei(decks, stundenplan){

}

// Eigener Bestätigungs-Dialog als Ersatz für window.confirm() -- siehe
// CSS-Kommentar bei .modal-overlay für den Grund. Baut ein Overlay direkt in
// document.body (nicht in #stage, das ja beim Bildschirmwechsel überschrieben
// wird) und gibt ein Promise<boolean> zurück, genau wie confirm() synchron
// true/false liefert, nur eben asynchron -- daher wird die Funktion mit
// "await" statt einer direkten Zuweisung aufgerufen. Generisch gehalten
// (text + Beschriftung des Bestätigen-Buttons als Parameter), damit sie sich
// für zukünftige "bist du sicher?"-Abfragen wiederverwenden lässt, nicht nur
// für den App-Reset.
function zeigeBestaetigungsDialog(text, bestaetigenText){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-text">${text}</div>
        <div class="modal-buttons">
          <button class="modal-btn modal-btn-abbrechen" id="modalAbbrechen">Abbrechen</button>
          <button class="modal-btn modal-btn-bestaetigen" id="modalBestaetigen">${bestaetigenText}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const schliessen = ergebnis => { overlay.remove(); resolve(ergebnis); };
    overlay.querySelector('#modalAbbrechen').onclick = () => schliessen(false);
    overlay.querySelector('#modalBestaetigen').onclick = () => schliessen(true);
    // Klick auf den dunklen Hintergrund selbst zählt wie "Abbrechen" --
    // nur wenn e.target das Overlay selbst ist, nicht die Box darin (sonst
    // würde auch ein Klick auf den Text die Box schließen).
    overlay.onclick = e => { if(e.target === overlay) schliessen(false); };
  });
}

// Setzt die komplette App zurück: löscht alle gespeicherten Daten (die
// hochgeladene Datei inkl. Stundenplan, UND jeglichen Fortschritt in jedem
// Deck) und lädt die Seite danach neu.
//
// Bewusst per location.reload() statt die In-Memory-Variablen (AKTIVE_DATEI,
// DECK_NAME, VOKABELN, idx, punkte, STUNDENPLAN, ...) einzeln von Hand auf
// ihren Ausgangswert zu setzen: ein Reload startet init() ganz neu und liest
// dabei den (jetzt leeren) Storage neu ein -- das garantiert exakt denselben
// Zustand wie beim allerersten echten Laden der App. Manuelles Zurücksetzen
// müsste dagegen bei jeder neuen Variable, die später im Code dazukommt,
// mitgepflegt werden und wäre eine wiederkehrende Fehlerquelle.
async function setzeAppKomplettZurueck(){
  const bestaetigt = await zeigeBestaetigungsDialog(
    'Wirklich alle Decks zurücksetzen?<br><br>Alle geladenen Decks, der Stundenplan und der gesamte Lernfortschritt gehen dabei verloren. Das kann <strong>nicht</strong> rückgängig gemacht werden.',
    'Zurücksetzen'
  );
  if(!bestaetigt) return;

  try{
    await window.storage.delete('vocab-datei');
    await loescheAltenFortschritt();
  }catch(e){
    // Falls das Löschen (teilweise) fehlschlägt, trotzdem neu laden --
    // dann zeigt die App wenigstens den tatsächlichen Ist-Zustand, statt in
    // einem widersprüchlichen Zwischenstand hängen zu bleiben.
  }

  location.reload();
}

// Alte Fortschritts-Einträge löschen, wenn eine neue Datei hochgeladen wird —
// sonst würde z.B. der Kartenindex eines alten Decks auf ein Deck mit anderem
// Inhalt, aber gleichem Blattnamen, angewendet.
async function loescheAltenFortschritt(){
  try{
    const liste = await window.storage.list('vocab-progress-');
    if(liste && liste.keys){
      for(const k of liste.keys){ await window.storage.delete(k); }
    }
  }catch(e){}
}

// ---------- Persistenz: Fortschritt pro Deck ----------
async function ladeFortschritt(deckName){
  try{
    const res = await window.storage.get('vocab-progress-' + deckName);
    if(res && res.value){
      const daten = JSON.parse(res.value);
      // daten.punkte kann bei älteren, vor diesem Update gespeicherten Ständen noch
      // leicht/schwierig enthalten -- die werden hier einfach ignoriert, da wir nur
      // noch heute auslesen. { heute:0, ...daten.punkte } würde sie sogar zurückholen,
      // deshalb explizit nur heute übernehmen.
      punkte = { heute: (daten.punkte && daten.punkte.heute) || 0 };
      idx = (daten.idx || 0) % VOKABELN.length;
      aktualisiereStats();
      return;
    }
  }catch(e){}
  punkte = { heute:0 };
  idx = 0;
  aktualisiereStats();
}

async function speichereFortschritt(){
  try{
    await window.storage.set('vocab-progress-' + DECK_NAME, JSON.stringify({ punkte, idx }));

}

// ---------- Stundenplan-Ansicht ----------
// STUNDENPLAN ist ein rohes Zeilen-Array (siehe leseStundenplan) -- erste
// Zeile wird als Kopfzeile gerendert, der Rest als Tabellenkörper. Zeilen mit
// "Pause" bzw. "Essen" in irgendeiner Zelle werden eingefärbt, ganz analog
// zur Original-xlsx-Vorlage (dort waren das die gelbe bzw. rötliche Zeile).
function zeigeStundenplan(){
  statsRow.style.display = 'none';
  resetRow.style.display = 'none';
  untertitelText.textContent = 'Stundenplan';

  // z.farbe gilt für Kopf- wie für Datenzellen gleichermaßen -- hat eine Zelle
  // in der xlsx wirklich keine Füllfarbe (farbe === null), bleibt es beim
  // CSS-Standardlook (dunkle Kopfzeile per .stundenplan-tabelle thead th,
  // weißer Zellhintergrund). Das inline style greift nur, wenn wirklich eine
  // Farbe aus der Datei da ist -- daher "immer die echte Farbe, sonst Default".
  const zelleHTML = (z, tag) => {
    const style = z.farbe ? ` style="background:${z.farbe}"` : '';
    return `<${tag}${style}>${z.text}</${tag}>`;
  };

  const [kopf, ...zeilen] = STUNDENPLAN;
  const kopfHTML = kopf.map(z => zelleHTML(z, 'th')).join('');
  const zeilenHTML = zeilen.map(zeile =>
    `<tr>${zeile.map(z => zelleHTML(z, 'td')).join('')}</tr>`
  ).join('');

  stage.innerHTML = `
    <div class="stundenplan-screen">
      <div class="stundenplan-wrapper">
        <table class="stundenplan-tabelle">
          <thead><tr>${kopfHTML}</tr></thead>
          <tbody>${zeilenHTML}</tbody>
        </table>
      </div>
      <div class="reset-row" style="margin-top:16px;"><a id="btnStundenplanZurueck">← Zurück</a></div>
    </div>
  `;
  document.getElementById('btnStundenplanZurueck').onclick = () => zeigeDeckAuswahl();
}

// "Laden"-Hub: zwei getrennte Wege, um an Karten zu kommen.

  statsRow.style.display = 'none';
  resetRow.style.display = 'none';
  untertitelText.textContent = 'Karteikarten';

  stage.innerHTML = `
    <div class="niveau-screen">

      const statusEl = document.getElementById('ladeStatus');

// Rendert die Kacheln der vordefinierten Sets, sobald config.xlsx da ist.
// Eigene Funktion (statt alles in zeigeLadenAuswahl), weil das Nachladen
// asynchron passiert -- der Nutzer könnte bis dahin längst weitergeklickt
// haben, daher der Check "gibt's das Zielelement überhaupt noch".
function renderVordefinierteSets(eintraege){
  const ziel = document.getElementById('ladeListe');
  if(!ziel) return;

  if(eintraege.length === 0){
    ziel.innerHTML = `<div class="lade-status">Keine Einträge in config.xlsx gefunden.</div>`;
    return;
  }

  const escape = s => s.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));

  ziel.innerHTML = eintraege.map((e, i) => `
    <div class="lade-kachel" data-index="${i}">
      <span class="lade-icon">📥</span>
      <span class="lade-label">${escape(e.anzeigename)}</span>
    </div>
  `).join('');

  ziel.querySelectorAll('[data-index]').forEach(el => {
    el.onclick = async () => {
      const eintrag = eintraege[Number(el.getAttribute('data-index'))];
      const fehlerEl = document.getElementById('ladeAuswahlFehler');
      fehlerEl.style.display = 'none';
      const labelEl = el.querySelector('.lade-label');
      const textVorher = labelEl.textContent;
      labelEl.textContent = 'Lädt …';
      try{
        const { decks, stundenplan } = await ladeDeckDateiVonGithub(eintrag.dateiname);
        if(Object.keys(decks).length === 0 && !stundenplan){
          throw new Error('Datei gefunden, aber keine gültigen Arbeitsblätter darin.');
        }
        await loescheAltenFortschritt();
        await speichereDatei(decks, stundenplan);
        AKTIVE_DATEI = decks;
        STUNDENPLAN = stundenplan;
        zeigeDeckAuswahl();
      } catch(err){
        labelEl.textContent = textVorher;
        fehlerEl.textContent = 'Konnte "' + eintrag.dateiname + '" nicht laden: ' + err.message;
        fehlerEl.style.display = 'block';
      }
    };
  });
}

function zeigeUploadFehler(msg){
  const el = document.getElementById('uploadFehler');
  if(el){ el.textContent = msg; el.style.display = 'block'; }

// ---------- Datei einlesen ----------
async function verarbeiteDatei(file){
  const fehlerEl = document.getElementById('uploadFehler');
  if(fehlerEl) fehlerEl.style.display = 'none';

  const name = file.name.toLowerCase();
  if(!name.endsWith('.xlsx') && !name.endsWith('.xls')){
    zeigeUploadFehler('Bitte nur .xlsx Dateien hochladen.');
    return;
  }

  let decks, stundenplan;
  try{
    ({ decks, stundenplan } = await leseXLSXDatei(file));
  } catch(e){
    zeigeUploadFehler('Fehler beim Lesen der Datei: ' + e.message);
    return;
  }

  const namen = Object.keys(decks);
  if(namen.length === 0 && !stundenplan){
    zeigeUploadFehler('Keine gültigen Arbeitsblätter gefunden. Jedes Blatt braucht Spalten "frage" und "antwort".');
    return;
  }

  await loescheAltenFortschritt();
  await speichereDatei(decks, stundenplan);
  AKTIVE_DATEI = decks;
  STUNDENPLAN = stundenplan;
  zeigeDeckAuswahl();
}

// Sucht in den ersten Zeilen eines Blatts die Header-Zeile (Zellen "frage" und
// "antwort") und liest ab dort die Datensätze ein. So funktioniert es auch,
// wenn vor dem Header noch Titel-/Erklärzeilen stehen (wie in der Vorlage).
function parseSheet(zeilen){
  let headerIdx = -1, frageIdx = -1, antwortIdx = -1, katIdx = -1, seite3Idx = -1, seite4Idx = -1;
  for(let i = 0; i < Math.min(zeilen.length, 15); i++){
    const zeile = zeilen[i].map(z => (z||'').toString().trim().toLowerCase());
    const fragePos = zeile.indexOf('frage');
    const antwortPos = zeile.indexOf('antwort');
    if(fragePos !== -1 && antwortPos !== -1){
      headerIdx = i; frageIdx = fragePos; antwortIdx = antwortPos;
      katIdx = zeile.indexOf('kat');
      seite3Idx = zeile.indexOf('seite3');
      seite4Idx = zeile.indexOf('seite4');
      break;
    }
  }
  if(headerIdx === -1) return [];

  const result = [];
  for(let i = headerIdx + 1; i < zeilen.length; i++){
    const row = zeilen[i];
    const frage = (row[frageIdx]||'').toString().trim();
    const antwort = (row[antwortIdx]||'').toString().trim();
    if(!frage || !antwort) continue;
    // Sehr lange Texte sind vermutlich Erklär-/Platzhaltertext, kein echtes Karteikarten-Paar.
    if(frage.length > 200 || antwort.length > 200) continue;
    // Eine "kat"-Zelle mit Klammern (z.B. "Kategorie (optional)") verrät eine
    // Beschreibungszeile aus einer Vorlage, keinen echten Kategorienamen.
    // Achtung: dieser Filter gilt NUR für kat, nicht für seite3/seite4 -- eigene
    // Zusatzseiten dürfen völlig legitim Klammern enthalten.
    const katRoh = katIdx !== -1 ? (row[katIdx]||'').toString() : '';
    if(katRoh.includes('(')) continue;
    result.push({
      frage,
      antwort,
      kat: katIdx !== -1 ? (katRoh.trim() || 'Eigene') : 'Eigene',
      seite3: seite3Idx !== -1 ? (row[seite3Idx]||'').toString().trim() : '',
      seite4: seite4Idx !== -1 ? (row[seite4Idx]||'').toString().trim() : ''
    });
  }
  return result;
}

// Sorgt dafür, dass window.XLSX verfügbar ist (lädt SheetJS bei Bedarf nach).
// Eigene Funktion, weil sowohl der Datei-Upload als auch der GitHub-Import
// (weiter unten) die Bibliothek brauchen -- so steht das Nachladen nur einmal.
function ladeSheetJSBibliothek(){
  return new Promise((resolve, reject) => {
    if(window.XLSX){ resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    script.onload = () => resolve();
    script.onerror = () => reject(new Error('SheetJS-Bibliothek konnte nicht geladen werden.'));
    document.head.appendChild(script);
  });
}

// Standard-Office-Farbpalette als Fallback für Theme-Farben (Index -> Hex).
// Hintergrund: SheetJS liefert pro Zelle zwar "diese Zelle nutzt Theme-Farbe
// Nr. X mit Tint Y", aber NICHT die Farbpalette des Workbooks selbst -- die
// steckt in einer separaten theme1.xml, die SheetJS beim Einlesen nicht mit
// rausgibt. Für die weit überwiegende Mehrheit der Excel-Dateien (Standard-
// "Office"-Design, nie manuell umgestellt) ist das trotzdem exakt richtig --
// nur bei einem individuell angepassten Excel-Theme würde diese Fallback-
// Palette nicht mehr zur echten Farbe passen.
const OFFICE_THEME = ['FFFFFF','000000','EEECE1','1F497D','4F81BD','C0504D','9BBB59','8064A2','4BACC6','F79646'];

// Excel-Tint (Aufhellen/Abdunkeln einer Basisfarbe, z.B. "Accent 2, Heller 40%")
// als lineare RGB-Näherung. tint > 0 hellt auf (Richtung Weiß), tint < 0
// dunkelt ab (Richtung Schwarz), tint 0 lässt die Farbe unverändert.
function wendeTintAn(hex, tint){
  if(!tint) return hex;
  const kanaele = [0,2,4].map(i => parseInt(hex.slice(i, i+2), 16));
  const angepasst = kanaele.map(k => {
    const neu = tint > 0 ? k * (1 - tint) + 255 * tint : k * (1 + tint);
    return Math.max(0, Math.min(255, Math.round(neu)));
  });
  return angepasst.map(k => k.toString(16).padStart(2, '0')).join('');
}

// Liefert die tatsächliche Füllfarbe einer Zelle als CSS-Hex-String (z.B.
// "#ffff00"), oder null, wenn die Zelle keine (erkennbare) Füllfarbe hat.
// Erfordert, dass das Workbook mit {cellStyles:true} gelesen wurde (siehe
// _parseWorkbook) -- sonst existiert cell.s gar nicht.
function zellFarbe(cell){
  const fg = cell && cell.s && cell.s.fgColor;
  if(!fg) return null;
  if(fg.rgb) return '#' + fg.rgb.slice(-6); // ARGB -> nur die letzten 6 Stellen (RGB)
  if(fg.theme !== undefined){
    const basis = OFFICE_THEME[fg.theme];
    return basis ? '#' + wendeTintAn(basis, fg.tint || 0) : null;
  }
  return null;
}

// Liest das Arbeitsblatt "Stundenplan" als reines Raster ein (keine
// frage/antwort-Struktur wie bei den Lern-Decks) -- jede Zelle wird zu
// { text, farbe }, farbe ist die tatsächliche Excel-Füllfarbe dieser Zelle
// (siehe zellFarbe) oder null. Komplett leere Zeilen werden übersprungen.
// Bewusst über !ref + decode_range statt sheet_to_json, weil sheet_to_json
// nur Werte liefert und die Style-Info (cell.s) dabei verloren ginge.
function leseStundenplan(ws){
  const ref = ws['!ref'];
  if(!ref) return [];
  const range = XLSX.utils.decode_range(ref);
  const zeilen = [];
  for(let r = range.s.r; r <= range.e.r; r++){
    const zeile = [];
    let hatInhalt = false;
    for(let c = range.s.c; c <= range.e.c; c++){
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      const text = cell ? (cell.w !== undefined ? cell.w : (cell.v !== undefined ? String(cell.v) : '')).trim() : '';
      if(text !== '') hatInhalt = true;
      zeile.push({ text, farbe: zellFarbe(cell) });
    }
    if(hatInhalt) zeilen.push(zeile);
  }
  return zeilen;
}

// Gemeinsame Kernlogik: fertiges Workbook (von XLSX.read()) -> Deck-Struktur.
// Ein Arbeitsblatt namens genau "Stundenplan" wird nicht als Lern-Deck
// behandelt, sondern separat als Rohraster für die Stundenplan-Ansicht.
function deckAusWorkbook(wb){
  const decks = {};
  let stundenplan = null;
  for(const blattname of wb.SheetNames){
    const ws = wb.Sheets[blattname];
    if(blattname === 'Stundenplan'){
      stundenplan = leseStundenplan(ws);
      continue;
    }
    const zeilen = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    const eintraege = parseSheet(zeilen);
    if(eintraege.length > 0) decks[blattname] = eintraege;
  }
  return { decks, stundenplan };
}

function leseXLSXDatei(file){
  return new Promise((resolve, reject) => {
    ladeSheetJSBibliothek()
      .then(() => _parseWorkbook(file, resolve, reject))
      .catch(reject);
  });
}

function _parseWorkbook(file, resolve, reject){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellStyles:true});
      resolve(deckAusWorkbook(wb));
    } catch(err){ reject(err); }
  };
  reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden.'));
  reader.readAsArrayBuffer(file);
}

// ---------- Vordefinierte Sets direkt von GitHub laden (config.xlsx + Deck-Dateien) ----------
// Gleiche Logik wie in Vocabolario/Ucabulario: config.xlsx und alle darin
// gelisteten Deck-Dateien liegen im selben Repo wie diese HTML-Datei selbst
// (Root des main-Branchs). raw.githubusercontent.com liefert die Rohdatei
// (nicht die HTML-Ansichtsseite von github.com) und setzt CORS-Header, die
// fetch() von der github.io-Seite aus erlauben.
//
// Statt Benutzername/Repo fest einzutragen, leiten wir beides aus der
// aktuellen Seiten-URL ab (window.location) -- so funktioniert derselbe Code
// unverändert in jedem Repo, ohne dass hier je eine URL von Hand angepasst
// werden muss. Erwartetes Format: https://BENUTZERNAME.github.io/REPO-NAME/...
function ermittleGithubRawBasis(){
  const benutzername = window.location.hostname.split('.')[0]; // "cb-os1" aus "cb-os1.github.io"
  const pfadTeile = window.location.pathname.split('/').filter(Boolean);
  const repo = pfadTeile[0] || '';
  return `https://raw.githubusercontent.com/${benutzername}/${repo}/main/`;
}
const GITHUB_RAW_BASIS = ermittleGithubRawBasis();

// Lädt eine beliebige Datei aus dem Repo per Dateinamen und gibt das fertig
// eingelesene Workbook zurück. Genutzt sowohl vom Config-Import als auch vom
// Deck-Import (DRY: Fetch + Fehlerbehandlung nur an einer Stelle).
async function ladeDateiVonGithub(dateiname){
  await ladeSheetJSBibliothek();
  const res = await fetch(GITHUB_RAW_BASIS + encodeURIComponent(dateiname));
  if(!res.ok){
    throw new Error('"' + dateiname + '" nicht gefunden (Status ' + res.status + ').');
  }
  const buffer = await res.arrayBuffer();
  return XLSX.read(buffer, {type:'array', cellStyles:true});
}

// Liest config.xlsx (erstes Arbeitsblatt, Spalten "Anzeigename"/"Dateiname" --
// bewusst dieselben Spaltennamen wie in Vocabolario/Ucabulario, damit
// dieselbe config.xlsx theoretisch für beide Apps nutzbar wäre) und gibt eine
// Liste sauberer Einträge zurück, leere/kaputte Zeilen werden rausgefiltert.
async function ladeConfigVonGithub(){
  const wb = await ladeDateiVonGithub('config.xlsx');
  const ws = wb.Sheets[wb.SheetNames[0]];
  const zeilen = XLSX.utils.sheet_to_json(ws, {defval:''});
  return zeilen
    .map(z => ({
      anzeigename: String(z['Anzeigename'] || '').trim(),
      dateiname: String(z['Dateiname'] || '').trim()
    }))
    .filter(e => e.anzeigename && e.dateiname);
}

async function ladeDeckDateiVonGithub(dateiname){
  const wb = await ladeDateiVonGithub(dateiname);
  return deckAusWorkbook(wb);
}

async function waehleDeck(name){
  DECK_NAME = name;
  await ladeFortschritt(name);
  untertitelText.textContent = `Deck · ${DECK_NAME}`;
  zeigeSortierAuswahl();
}

function zeigeSortierAuswahl(){
  stage.innerHTML = `
    <div class="niveau-screen">
      <div class="niveau-frage">Sortiert oder gemischt lernen?</div>
      <div class="niveau-unter">${AKTIVE_DATEI[DECK_NAME].length} Karten aus „${DECK_NAME}“. Sortiert = Reihenfolge wie in deiner Datei. Gemischt = zufällige Reihenfolge.</div>
      <div class="niveau-optionen">
        <div class="niveau-btn a1" id="btnSortiert">
          <span class="label">Sortiert</span>
          <span class="desc">Genau wie in der xlsx</span>
        </div>
        <div class="niveau-btn a2" id="btnGemischt">
          <span class="label">Gemischt</span>
          <span class="desc">Zufällige Reihenfolge</span>
        </div>
      </div>
    </div>
  `;
  document.getElementById('btnSortiert').onclick = () => waehleSortierung(true);
  document.getElementById('btnGemischt').onclick = () => waehleSortierung(false);
}

function waehleSortierung(sortiert){
  SORTIERT = sortiert;
  VOKABELN = vokabelnNeuLaden();
  statsRow.style.display = 'flex';
  resetRow.style.display = 'block';
  aktualisiereStats();
  render();
}

function gibFaceHTML(v, zustand){
  // Kleiner Hinweis oben rechts, dass es zu dieser Karte eine eigene Notiz gibt.
  // Nur auf front/back -- auf der Notiz-Seite selbst wäre er redundant.
  const notizBadge = hatNotiz(v) ? '<div class="notiz-badge">N</div>' : '';

  if(zustand === 0){
    return `<div class="face front">
      <div class="kategorie">${v.kat}</div>
      ${notizBadge}
      <div class="wort">${v.frage}</div>
      <div class="hinweis">Antippen für die Antwort</div>
    </div>`;
  }
  const seiten = extraSeiten(v);
  if(zustand === 1){
    const naechsterHinweis = seiten.length > 0
      ? `<div class="hinweis" style="opacity:0.5">Antippen für ${seiten[0].titel}</div>`
      : '';
    return `<div class="face back">
      <div class="kategorie">${v.kat}</div>
      ${notizBadge}
      <div class="wort">${v.antwort}</div>
      ${naechsterHinweis}
    </div>`;
  }
  // zustand 2, 3, ... -- eine der Extra-Seiten aus extraSeiten(v). Jede bekommt
  // ihre eigene Karte mit eigenem Titel (Seite 3 / Seite 4) statt beide
  // zusammen auf einer Seite zu zeigen.
  const seite = seiten[zustand - 2];
  const gibtWeitere = zustand - 2 + 1 < seiten.length;
  const hinweis = gibtWeitere
    ? `<div class="hinweis" style="opacity:0.5">Antippen für ${seiten[zustand - 1].titel}</div>`
    : '';
  return `<div class="face notiz">
    <div class="kategorie">${seite.titel}</div>
    <div class="notiz-text">${seite.text}</div>
    ${hinweis}
  </div>`;
}

function render(){
  if(idx >= VOKABELN.length){
    stage.innerHTML = `
      <div class="fertig">
        <div class="wort">Stapel geschafft 🎉</div>
        <p>${punkte.heute} Karten heute gelernt.</p>
        <button id="nochmal" style="box-shadow:3px 3px 0 var(--inchiostro)">Von vorne beginnen</button>
        <div class="reset-row" style="margin-top:14px;"><a id="zurueckZurLetzten">← Zur letzten Karte zurück</a></div>
      </div>`;
    document.getElementById('nochmal').onclick = () => { idx = 0; VOKABELN = vokabelnNeuLaden(); speichereFortschritt(); render(); };
    document.getElementById('zurueckZurLetzten').onclick = () => { idx = VOKABELN.length - 1; render(); };
    return;
  }

  const v = VOKABELN[idx];
  zustand = 0;

  stage.innerHTML = `
    <div class="deck-label">${idx+1} / ${VOKABELN.length} · ${DECK_NAME}</div>
    <div class="card" id="karte">
      ${gibFaceHTML(v, 0)}
    </div>
    <div class="controls">
      <button class="btn-zurueck" id="btnZurueckKarte" ${idx === 0 ? 'disabled' : ''}>← Zurück</button>
      <button class="btn-weiter" id="btnWeiter">Weiter →</button>
    </div>
  `;

  const karte = document.getElementById('karte');
  karte.onclick = () => {
    const maxZustand = maxZustandFuer(v);
    zustand = (zustand + 1) > maxZustand ? 0 : zustand + 1;
    karte.innerHTML = gibFaceHTML(v, zustand);
    const faceEl = karte.querySelector('.face');
    faceEl.classList.add('eintretend');
    requestAnimationFrame(() => faceEl.classList.remove('eintretend'));
  };

  document.getElementById('btnWeiter').onclick = (e) => { e.stopPropagation(); weiter(); };
  document.getElementById('btnZurueckKarte').onclick = (e) => { e.stopPropagation(); vorherige(); };
}

function weiter(){
  punkte.heute++;
  idx++;
  speichereFortschritt();
  aktualisiereStats();
  render();
}

// Eine Karte zurückspringen. idx wird nie unter 0 gesetzt -- der Zurück-Button
// ist bei der ersten Karte ohnehin deaktiviert (siehe render()), das hier ist
// nur eine zusätzliche Absicherung. punkte.heute wird bewusst NICHT verringert:
// Zurückblättern ist kein "Rückgängigmachen" des Lernens, sondern nur Navigation.
function vorherige(){
  if(idx === 0) return;
  idx--;
  speichereFortschritt();
  render();
}

document.getElementById('resetLink').onclick = async () => {
  idx = 0;
  VOKABELN = vokabelnNeuLaden();
  punkte = { heute:0 };
  await speichereFortschritt();
  aktualisiereStats();
  render();
};

document.getElementById('deckLink').onclick = () => {
  zeigeDeckAuswahl();
};

document.getElementById('linkVokabelnLaden').onclick = () => {
  zeigeLadenAuswahl();
};

(async function init(){
  statsRow.style.display = 'none';
  resetRow.style.display = 'none';
  const gespeichert = await ladeDatei();
  const decks = gespeichert && gespeichert.decks;
  if(decks && Object.keys(decks).length > 0){
    AKTIVE_DATEI = decks;
    STUNDENPLAN = gespeichert.stundenplan || null;
    zeigeDeckAuswahl();
  } else {
    zeigeLeerenZustand();
  }
})();
</script>
